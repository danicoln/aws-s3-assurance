spring.application.name=aws-s3-assurance
server.port=${PORT:8080}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
app.aws.region=${AWS_REGION:us-east-2}
app.aws.s3.bucket=${AWS_S3_BUCKET:amzn-s3-assurance-826917684746-us-east-2-an}
app.aws.dynamodb.table-name=${AWS_DYNAMODB_TABLE:dynamodb-assurance}
app.aws.sqs.queue-url=${AWS_SQS_QUEUE_URL:}
app.aws.sns.topic-arn=${AWS_SNS_TOPIC_ARN:arn:aws:sns:us-east-2:826917684746:assurance-sns}
